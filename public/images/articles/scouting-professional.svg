<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a2418;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0044cc;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D66C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00a854;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2040;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:0.95"/>
    </linearGradient>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#0066FF" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="url(#bg)"/>

  <!-- Pitch -->
  <rect x="60" y="40" width="680" height="380" rx="4" fill="url(#pitch)" opacity="0.9"/>

  <!-- Grass stripes -->
  <rect x="60" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="196" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="332" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="468" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="604" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>

  <!-- Pitch outline -->
  <rect x="60" y="40" width="680" height="380" rx="4" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Halfway line -->
  <line x1="400" y1="40" x2="400" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Center circle -->
  <circle cx="400" cy="230" r="60" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="3" fill="rgba(255,255,255,0.4)"/>

  <!-- Left penalty area -->
  <rect x="60" y="130" width="110" height="200" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <rect x="60" y="175" width="45" height="110" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <rect x="48" y="195" width="12" height="70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="130" cy="230" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <path d="M 170 180 A 60 60 0 0 1 170 280" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Right penalty area -->
  <rect x="630" y="130" width="110" height="200" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <rect x="695" y="175" width="45" height="110" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <rect x="740" y="195" width="12" height="70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="670" cy="230" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <path d="M 630 180 A 60 60 0 0 0 630 280" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Corner arcs -->
  <path d="M 60 52 A 12 12 0 0 1 72 40" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <path d="M 740 40 A 12 12 0 0 1 752 52" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <path d="M 60 408 A 12 12 0 0 0 72 420" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <path d="M 740 420 A 12 12 0 0 0 752 408" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- ═══ PLAYERS (generic dots on pitch) ═══ -->
  <!-- GK -->
  <circle cx="100" cy="230" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <!-- Defenders -->
  <circle cx="210" cy="130" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="210" cy="195" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="210" cy="265" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="210" cy="330" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <!-- Midfielders -->
  <circle cx="350" cy="160" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="350" cy="230" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="350" cy="300" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <!-- Forwards -->
  <circle cx="490" cy="145" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="490" cy="230" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>
  <circle cx="490" cy="315" r="14" fill="url(#purple-glow)" filter="url(#glow-soft)" opacity="0.7"/>

  <!-- ═══ SCOUTING OVERLAY — Central Card ═══ -->
  <!-- Main scouting report card (centre-right) -->
  <rect x="560" y="55" width="190" height="300" rx="8" fill="url(#card-bg)" stroke="rgba(0,102,255,0.35)" stroke-width="1.5"/>

  <!-- Card header -->
  <rect x="560" y="55" width="190" height="32" rx="8" fill="url(#blue-glow)" opacity="0.9"/>
  <text x="655" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">SCOUT REPORT</text>

  <!-- Player silhouette icon -->
  <circle cx="655" cy="120" r="18" fill="rgba(0,102,255,0.2)" stroke="rgba(0,102,255,0.5)" stroke-width="1.5"/>
  <circle cx="655" cy="113" r="8" fill="rgba(255,255,255,0.6)"/>
  <path d="M 637 135 Q 637 128 655 128 Q 673 128 673 135" fill="rgba(255,255,255,0.6)"/>

  <!-- Score bars -->
  <!-- Technical -->
  <text x="572" y="160" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">TECHNICAL</text>
  <rect x="572" y="164" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="572" y="164" width="102" height="6" rx="3" fill="url(#blue-glow)" opacity="0.9"/>

  <!-- Tactical -->
  <text x="572" y="183" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">TACTICAL</text>
  <rect x="572" y="187" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="572" y="187" width="90" height="6" rx="3" fill="url(#blue-glow)" opacity="0.9"/>

  <!-- Physical -->
  <text x="572" y="206" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">PHYSICAL</text>
  <rect x="572" y="210" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="572" y="210" width="108" height="6" rx="3" fill="url(#green-glow)" opacity="0.9"/>

  <!-- Psychological -->
  <text x="572" y="229" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">PSYCHOLOGICAL</text>
  <rect x="572" y="233" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="572" y="233" width="96" height="6" rx="3" fill="url(#purple-glow)" opacity="0.9"/>

  <!-- Potential -->
  <text x="572" y="252" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.6)">POTENTIAL</text>
  <rect x="572" y="256" width="120" height="6" rx="3" fill="rgba(255,255,255,0.1)"/>
  <rect x="572" y="256" width="114" height="6" rx="3" fill="url(#blue-glow)" opacity="0.9"/>

  <!-- Divider -->
  <line x1="572" y1="274" x2="738" y2="274" stroke="rgba(0,102,255,0.2)" stroke-width="1"/>

  <!-- Stars rating -->
  <text x="572" y="292" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">OVERALL RATING</text>
  <!-- 4.5 stars -->
  <text x="572" y="330" font-family="Arial,sans-serif" font-size="18" fill="#0066FF" opacity="0.9">★ ★ ★ ★ ½</text>

  <!-- ═══ MAGNIFYING GLASS ICON (top-left) ═══ -->
  <circle cx="140" cy="90" r="25" fill="rgba(0,102,255,0.12)" stroke="rgba(0,102,255,0.4)" stroke-width="1.5"/>
  <!-- Glass circle -->
  <circle cx="135" cy="85" r="13" fill="none" stroke="#0066FF" stroke-width="2.5" opacity="0.85"/>
  <!-- Handle -->
  <line x1="144" y1="94" x2="152" y2="102" stroke="#0066FF" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- ═══ DATA BADGE (bottom-left) ═══ -->
  <rect x="68" y="350" width="140" height="52" rx="6" fill="rgba(0,102,255,0.1)" stroke="rgba(0,102,255,0.3)" stroke-width="1"/>
  <text x="138" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">xG · xA · PPDA · WYSCOUT</text>
  <text x="138" y="388" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="rgba(0,102,255,0.9)">DATA-DRIVEN ANALYSIS</text>

  <!-- ═══ ANALYSIS badge ═══ -->
  <rect x="20" y="20" width="80" height="26" rx="5" fill="rgba(0,102,255,0.18)" stroke="rgba(0,102,255,0.4)" stroke-width="1"/>
  <text x="60" y="37" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0066FF">ANALYSIS</text>

  <!-- Title overlay at bottom -->
  <rect x="0" y="380" width="800" height="80" fill="url(#bg)" opacity="0.75"/>
  <text x="380" y="412" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#0066FF" filter="url(#text-shadow)">SCOUTING IN PROFESSIONAL FOOTBALL</text>
  <text x="380" y="435" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Technical · Tactical · Physical · Psychological · Potential</text>
</svg>
