<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1f3c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0a2418;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2a1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D66C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00a854;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0044cc;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00D66C" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="460" fill="url(#bg)"/>

  <!-- Pitch -->
  <rect x="60" y="40" width="680" height="380" rx="4" fill="url(#pitch)" opacity="0.9"/>

  <!-- Grass stripes -->
  <rect x="60" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="196" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="332" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="468" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>
  <rect x="604" y="40" width="68" height="380" fill="#0e2d1c" opacity="0.4"/>

  <!-- Pitch outline -->
  <rect x="60" y="40" width="680" height="380" rx="4" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Halfway line -->
  <line x1="400" y1="40" x2="400" y2="420" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Center circle -->
  <circle cx="400" cy="230" r="60" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <circle cx="400" cy="230" r="3" fill="rgba(255,255,255,0.4)"/>

  <!-- Left penalty area -->
  <rect x="60" y="130" width="110" height="200" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Left goal area -->
  <rect x="60" y="175" width="45" height="110" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Left goal -->
  <rect x="48" y="195" width="12" height="70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Left penalty spot -->
  <circle cx="130" cy="230" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <!-- Left penalty arc -->
  <path d="M 170 180 A 60 60 0 0 1 170 280" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Right penalty area -->
  <rect x="630" y="130" width="110" height="200" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Right goal area -->
  <rect x="695" y="175" width="45" height="110" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <!-- Right goal -->
  <rect x="740" y="195" width="12" height="70" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Right penalty spot -->
  <circle cx="670" cy="230" r="2.5" fill="rgba(255,255,255,0.35)"/>
  <!-- Right penalty arc -->
  <path d="M 630 180 A 60 60 0 0 0 630 280" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>

  <!-- Corner arcs -->
  <path d="M 60 52 A 12 12 0 0 1 72 40" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <path d="M 740 40 A 12 12 0 0 1 752 52" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <path d="M 60 408 A 12 12 0 0 0 72 420" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
  <path d="M 740 420 A 12 12 0 0 0 752 408" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>

  <!-- ═══ TACTICAL ARROWS (dashed) ═══ -->
  <!-- Arrow: player 11 moving up -->
  <line x1="205" y1="135" x2="205" y2="95" stroke="#00D66C" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="205,83 199,97 211,97" fill="#00D66C" opacity="0.7"/>

  <!-- Arrow: player 7 moving down -->
  <line x1="205" y1="320" x2="205" y2="365" stroke="#00D66C" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="205,377 199,363 211,363" fill="#00D66C" opacity="0.7"/>

  <!-- Arrow: player 10 moving right -->
  <line x1="510" y1="160" x2="555" y2="160" stroke="#00D66C" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="567,160 553,154 553,166" fill="#00D66C" opacity="0.7"/>

  <!-- Arrow: player 9 moving right -->
  <line x1="510" y1="300" x2="555" y2="300" stroke="#00D66C" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="567,300 553,294 553,306" fill="#00D66C" opacity="0.7"/>

  <!-- ═══ PLAYERS (left team - green) ═══ -->

  <!-- GK: 1 -->
  <circle cx="100" cy="230" r="18" fill="url(#blue-glow)" filter="url(#glow-soft)" opacity="0.9"/>
  <text x="100" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white">1</text>

  <!-- DEF: 2 (RB) -->
  <circle cx="200" cy="340" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="200" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">2</text>

  <!-- DEF: 5 (CB) -->
  <circle cx="200" cy="270" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="200" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">5</text>

  <!-- DEF: 4 (CB) -->
  <circle cx="200" cy="190" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">4</text>

  <!-- DEF: 3 (LB) -->
  <circle cx="200" cy="120" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="200" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">3</text>

  <!-- MID: 8 -->
  <circle cx="330" cy="190" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="330" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">8</text>

  <!-- MID: 6 -->
  <circle cx="330" cy="270" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="330" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">6</text>

  <!-- MID: 11 (LW) -->
  <circle cx="460" cy="140" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="460" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">11</text>

  <!-- MID: 7 (RW) -->
  <circle cx="460" cy="320" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="460" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">7</text>

  <!-- FWD: 10 -->
  <circle cx="580" cy="170" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="580" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">10</text>

  <!-- FWD: 9 -->
  <circle cx="580" cy="290" r="18" fill="url(#green-glow)" filter="url(#glow-green)" opacity="0.9"/>
  <text x="580" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0a1628">9</text>

  <!-- Ball near center -->
  <circle cx="400" cy="230" r="8" fill="white" opacity="0.85"/>
  <circle cx="400" cy="230" r="8" fill="none" stroke="#00D66C" stroke-width="1.5" opacity="0.5"/>

  <!-- ═══ OVERLAY LABEL ═══ -->
  <rect x="0" y="0" width="800" height="460" fill="linear-gradient(to bottom, transparent, rgba(10,22,40,0.5))" opacity="0.3"/>

  <!-- Formation badge -->
  <rect x="20" y="20" width="72" height="26" rx="5" fill="rgba(0,214,108,0.18)" stroke="rgba(0,214,108,0.4)" stroke-width="1"/>
  <text x="56" y="37" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#00D66C">4 – 4 – 2</text>

  <!-- Title overlay at bottom -->
  <rect x="0" y="380" width="800" height="80" fill="url(#bg)" opacity="0.7"/>
  <text x="400" y="412" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#00D66C" filter="url(#text-shadow)">TACTICAL SYSTEMS IN MODERN FOOTBALL</text>
  <text x="400" y="435" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.55)">Organisation · Player Profiling · Game Moments · Adaptation</text>
</svg>
